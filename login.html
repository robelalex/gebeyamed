<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GebeyaMed | Secure Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 350px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #2980b9; }
        .error { color: red; font-size: 14px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>GEBEYAMED Staff</h2>
    <div id="errorMsg" class="error">Invalid email or password</div>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleLogin()">Login to Dashboard</button>
</div>

<script>
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            window.location.href = '/vendor'; // Redirect to inventory on success
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }
</script>
</body>
</html>
